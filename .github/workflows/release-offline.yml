name: Release Offline Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build offline bundle
        run: npm run build

      - name: Create zip archive
        id: package
        run: |
          TAG="${GITHUB_REF_NAME}"
          ZIP_NAME="lightbot-${TAG}.zip"
          cd dist
          zip -r "../${ZIP_NAME}" .
          cd ..
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release and upload archive
        uses: softprops/action-gh-release@v2
        with:
          name: Lightbot ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.package.outputs.zip_name }}
          generate_release_notes: true
